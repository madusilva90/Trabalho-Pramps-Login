<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petly</title>
    <link rel="stylesheet" href="Brinquedos.css">
</head>
<body>
    <form>
        <h1> Brinquedos </h1>
        <div class="produto">
            <img src="Brinquedo1.jpg" alt="Bolinha pra cachorro">
            <h3>Bolinha</h3>
            <p class="preco">R$15,90 <br> A unidade</p>
            <button type="button">COMPRAR</button>
        </div>
        <div class="produto">
            <img src="brinquedo para passarinho.jpg" alt="Brinquedo para passaros">
            <h3>Brinquedos para passaros</h3>
            <p class="preco">R$22,50</p>
            <button type="button">COMPRAR</button>
        </div>
        <div class="produto">
            <img src="arranhador pra gato.jpg" alt="Arranhador">
            <h3>Arranhador</h3>
            <p class="preco">R$89,90 </p>
            <button type="button">COMPRAR</button>
        </div>
        <div class="produto">
            <img src="negocio de pendurar passarinho.jpg" alt="Balanço para passaros">
            <h3>Balanço para passaros</h3>
            <p class="preco">R$18,00 </p>
            <button type="button">COMPRAR</button>
        </div>
        <div class="produto">
            <img src="osso de brinquedo.jpg" alt="Osso de borracha">
            <h3>Osso de borracha</h3>
            <p class="preco">R$12,00 <br>A unidade</p>
            <button type="button">COMPRAR</button>
        </div>
        <div class="produto">
            <img src="rato pra gato.jpg" alt="Brinquedo para gato">
            <h3>Brinquedo para gato</h3>
            <p class="preco">R$15,90 <br>A unidade</p>
            <button type="button">COMPRAR</button>
        </div>
    </form>
    
</body>
</html>
